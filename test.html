<!DOCTYPE html>
<html>
<head>

<title>CET Mock Test</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
}

.question-area{
flex:3;
padding:30px;
}

.palette{
flex:1;
background:#14233b;
padding:20px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.notvisited{background:grey}
.answered{background:#22c55e}
.review{background:#a855f7}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.options label{
display:block;
margin:10px 0;
}

.timer{
font-weight:bold;
color:#22c55e;
}

</style>

</head>

<body>

<header>

<h2>CET Mock Test</h2>
<div class="timer" id="timer">Time Left: 180:00</div>

</header>

<div class="container">

<div class="question-area">

<h3 id="qText"></h3>

<div id="options" class="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAnswer()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

</div>

<div class="palette" id="palette"></div>

</div>

<script>

/* LOAD FROM ADMIN */
let questions = JSON.parse(localStorage.getItem("liveTest")) || []

if(questions.length === 0){
alert("❌ No test uploaded by admin")
}

/* VARIABLES */
let current=0
let answers={}
let review={}

/* TIMER */
let totalTime = 180 * 60

let timerInterval = setInterval(()=>{
totalTime--

let m = Math.floor(totalTime/60)
let s = totalTime%60

document.getElementById("timer").innerText =
"Time Left: "+m+":"+ (s<10?"0"+s:s)

if(totalTime<=0){
clearInterval(timerInterval)
submitExam()
}

},1000)

/* CREATE PALETTE */
function createPalette(){

let p=document.getElementById("palette")
p.innerHTML=""

questions.forEach((q,i)=>{

let btn=document.createElement("button")
btn.innerText=i+1
btn.className="notvisited"

btn.onclick=()=>{
current=i
showQuestion()
}

btn.id="p"+i

p.appendChild(btn)

})

}

/* SHOW QUESTION */
function showQuestion(){

let q=questions[current]

document.getElementById("qText").innerText =
"Question "+(current+1)+" "+q.question

let optDiv=document.getElementById("options")
optDiv.innerHTML=""

q.options.forEach((opt,i)=>{

let checked = answers[current]==i ? "checked" : ""

optDiv.innerHTML+=`
<label>
<input type="radio" name="opt" value="${i}" ${checked}
onclick="selectOption(${i})">
${opt}
</label>
`

})

}

/* SELECT OPTION */
function selectOption(i){

answers[current]=i
document.getElementById("p"+current).className="answered"

}

/* NAVIGATION */
function saveNext(){
next()
}

function next(){
if(current<questions.length-1){
current++
showQuestion()
}
}

function prev(){
if(current>0){
current--
showQuestion()
}
}

/* REVIEW */
function markReview(){
review[current]=true
document.getElementById("p"+current).className="review"
}

/* CLEAR */
function clearAnswer(){
delete answers[current]
document.getElementById("p"+current).className="notvisited"
showQuestion()
}

/* SUBMIT */
function submitExam(){

let score = 0

questions.forEach((q,i)=>{
if(answers[i] == q.correct){
score++
}
})

let accuracy = (score/questions.length*100).toFixed(2)

alert("Score: "+score+"/"+questions.length+"\nAccuracy: "+accuracy+"%")

/* SAVE HISTORY */
let history = JSON.parse(localStorage.getItem("examHistory")) || []

history.push({
date:new Date().toLocaleDateString(),
score:score,
total:questions.length,
accuracy:accuracy
})

localStorage.setItem("examHistory",JSON.stringify(history))

}

/* INIT */
createPalette()
showQuestion()

</script>

</body>

</html>
