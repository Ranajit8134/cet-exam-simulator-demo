<!DOCTYPE html>
<html>
<head>
<title>CET Exam</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
padding:20px;
}

.section{
margin-bottom:30px;
}

.q{
margin:15px 0;
}

label{
display:block;
margin:5px 0;
}

h2{
border-bottom:1px solid #555;
}

button{
padding:10px;
margin-top:20px;
background:#22c55e;
border:none;
color:white;
}
</style>
</head>

<body>

<h2>CET Examination</h2>

<div id="exam"></div>

<button onclick="submitExam()">Submit Exam</button>

<script>

let questions = JSON.parse(localStorage.getItem("liveTest")) || []
let answers={}

let subjects=["Physics","Chemistry","Math","Biology"]

function render(){

let exam=document.getElementById("exam")
exam.innerHTML=""

subjects.forEach(sub=>{

let sec=document.createElement("div")
sec.className="section"

sec.innerHTML="<h2>"+sub+"</h2>"

let filtered=questions.filter(q=>q.subject==sub)

filtered.forEach((q,i)=>{

let div=document.createElement("div")
div.className="q"

let idx=questions.indexOf(q)

div.innerHTML=`
<p>${q.question}</p>

<label><input type="radio" name="q${idx}" onclick="ans(${idx},0)"> ${q.options[0]}</label>
<label><input type="radio" name="q${idx}" onclick="ans(${idx},1)"> ${q.options[1]}</label>
<label><input type="radio" name="q${idx}" onclick="ans(${idx},2)"> ${q.options[2]}</label>
<label><input type="radio" name="q${idx}" onclick="ans(${idx},3)"> ${q.options[3]}</label>
`

sec.appendChild(div)

})

exam.appendChild(sec)

})

}

function ans(i,v){
answers[i]=v
}

function submitExam(){

let score=0

questions.forEach((q,i)=>{

let mark = (q.subject=="Math" || q.subject=="Biology") ? 2 : 1

if(answers[i]==q.correct){
score += mark
}

})

let username=localStorage.getItem("user") || "Student"

let results = JSON.parse(localStorage.getItem("leaderboard")) || []

results.push({
name:username,
score:score
})

results.sort((a,b)=>b.score-a.score)

localStorage.setItem("leaderboard",JSON.stringify(results))

alert("Your Score: "+score)

window.location.href="leaderboard.html"

}

render()

</script>

</body>
</html>
