<!DOCTYPE html>
<html>
<head>
<title>CET Examination</title>

<style>
body{font-family:Arial;background:#0b1a2f;color:white;margin:0;}
header{background:#081423;padding:15px;display:flex;justify-content:space-between;}

.container{display:flex;}

.question-area{flex:3;padding:25px;}
.palette{flex:1;background:#14233b;padding:20px;height:100vh;overflow:auto;}

.palette button{
width:40px;height:40px;margin:4px;border:none;border-radius:6px;font-weight:bold;
}

.notvisited{background:#ccc;color:black;}
.notanswered{background:#ef4444;}
.answered{background:#22c55e;}
.review{background:#a855f7;}

button{
padding:10px 15px;margin:5px;border:none;border-radius:5px;
background:#22c55e;color:white;cursor:pointer;
}

.option{
display:block;
padding:8px;
margin:5px 0;
cursor:pointer;
border-radius:5px;
}

.option:hover{
background:#1e293b;
}
</style>
</head>

<body>

<header>
<h2>CET Examination</h2>
<div id="timer">180:00</div>
</header>

<div class="container">

<div class="question-area">

<h3 id="subjectTitle"></h3>
<h3 id="qText"></h3>
<div id="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAnswer()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

<h2 id="result"></h2>

</div>

<div class="palette" id="palette"></div>

</div>

<script>

/* USER */
let username = localStorage.getItem("currentUser") || "Guest"

/* LOAD QUESTIONS */
let allQuestions = JSON.parse(localStorage.getItem("examQuestions")) || []

if(allQuestions.length===0){
document.getElementById("qText").innerText="⚠ No Questions Loaded"
throw "No questions"
}

/* SUBJECT DETECTION */
let hasMath = allQuestions.some(q=>q.subject==="Mathematics")
let subjects = hasMath ? ["Physics","Chemistry","Mathematics"] 
                      : ["Physics","Chemistry","Biology"]

/* GROUP QUESTIONS */
let subjectWise = {}
subjects.forEach(s=>{
subjectWise[s]=allQuestions.filter(q=>q.subject===s)
})

let currentSubjectIndex = 0
let current = 0

/* STATE */
let answers={}
let review={}
let visited={}

/* TIMER */
let time=180*60
setInterval(()=>{
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerText=`${m}:${s<10?"0"+s:s}`
time--
},1000)

/* GET CURRENT LIST */
function getCurrentList(){
return subjectWise[subjects[currentSubjectIndex]]
}

/* PALETTE */
function createPalette(){
let p=document.getElementById("palette")
p.innerHTML=""

let list = getCurrentList()

list.forEach((q,i)=>{
let b=document.createElement("button")
b.innerText=i+1
b.className="notvisited"

b.onclick=()=>{
current=i
showQuestion()
}

b.id="p"+i
p.appendChild(b)
})
}

/* UPDATE COLOR */
function updatePalette(i){
let btn=document.getElementById("p"+i)

let key = subjects[currentSubjectIndex]+"_"+i

if(review[key]){
btn.className="review"
}
else if(answers[key]!==undefined){
btn.className="answered"
}
else if(visited[key]){
btn.className="notanswered"
}
else{
btn.className="notvisited"
}
}

/* SHOW */
function showQuestion(){

let list = getCurrentList()

if(list.length===0){
document.getElementById("qText").innerText="No questions in this subject"
return
}

let key = subjects[currentSubjectIndex]+"_"+current
visited[key]=true

let q=list[current]

document.getElementById("subjectTitle").innerText="Subject: "+subjects[currentSubjectIndex]
document.getElementById("qText").innerText="Q"+(current+1)+" : "+q.question

let optDiv=document.getElementById("options")
optDiv.innerHTML=""

q.options.forEach((opt,i)=>{
let checked=answers[key]==i?"checked":""

optDiv.innerHTML+=`
<label class="option">
<input type="radio" name="q${currentSubjectIndex}_${current}" ${checked}
onclick="selectOption(${i})">
${opt}
</label>
`
})

updatePalette(current)
}

/* SELECT */
function selectOption(i){
let key = subjects[currentSubjectIndex]+"_"+current
answers[key]=i
}

/* NAV */
function saveNext(){
updatePalette(current)
next()
}

function next(){
let list = getCurrentList()

if(current < list.length-1){
current++
showQuestion()
}
else{
if(currentSubjectIndex < subjects.length-1){
currentSubjectIndex++
current=0
createPalette()
showQuestion()
}
}
}

/* ✅ FIXED PREVIOUS BUTTON */
function prev(){

if(current > 0){
current--
showQuestion()
}
else{

if(currentSubjectIndex > 0){

currentSubjectIndex--

let list = getCurrentList()
current = list.length - 1

createPalette()
showQuestion()

}

}

}

/* REVIEW */
function markReview(){
let key = subjects[currentSubjectIndex]+"_"+current
review[key]=true
updatePalette(current)
}

/* CLEAR */
function clearAnswer(){
let key = subjects[currentSubjectIndex]+"_"+current
delete answers[key]
delete review[key]
updatePalette(current)
showQuestion()
}

/* SUBMIT */
function submitExam(){

let score=0

allQuestions.forEach((q,i)=>{

let index = subjectWise[q.subject].indexOf(q)
let key = q.subject+"_"+index

if(answers[key]==q.correct){

if(q.subject==="Mathematics" || q.subject==="Biology"){
score+=2
}else{
score+=1
}

}
})

document.getElementById("result").innerText="Your Score: "+score

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || []

leaderboard.push({
name: username,
score: score
})

leaderboard.sort((a,b)=>b.score-a.score)

localStorage.setItem("leaderboard", JSON.stringify(leaderboard))

}

/* INIT */
createPalette()
showQuestion()

</script>

</body>
</html>
