<!DOCTYPE html>
<html>
<head>
<title>CET Examination</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
}

.question-area{
flex:3;
padding:25px;
}

.palette{
flex:1;
background:#14233b;
padding:20px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.notvisited{background:grey}
.answered{background:#22c55e}
.review{background:#a855f7}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.subject{
font-size:18px;
margin-bottom:10px;
color:#22c55e;
}

</style>
</head>

<body>

<header>
<h2>CET Examination</h2>
<div id="timer">180:00</div>
</header>

<div class="container">

<div class="question-area">

<div id="subjectName" class="subject"></div>

<h3 id="qText"></h3>

<div id="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAnswer()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

<h2 id="result"></h2>

</div>

<div class="palette" id="palette"></div>

</div>

<script>

/* ===== LOAD QUESTIONS FROM ADMIN ===== */

let questions = JSON.parse(localStorage.getItem("examQuestions")) || []

if(questions.length === 0){
alert("No questions uploaded from admin panel")
}

/* ===== VARIABLES ===== */

let current=0
let answers={}
let review={}

/* ===== TIMER ===== */

let time=180*60
setInterval(()=>{
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerText=`${m}:${s<10?"0"+s:s}`
time--
},1000)

/* ===== CREATE PALETTE ===== */

function createPalette(){
let p=document.getElementById("palette")
p.innerHTML=""

questions.forEach((q,i)=>{
let btn=document.createElement("button")
btn.innerText=i+1
btn.className="notvisited"

btn.onclick=()=>{
current=i
showQuestion()
}

btn.id="p"+i
p.appendChild(btn)
})
}

/* ===== SHOW QUESTION ===== */

function showQuestion(){

let q=questions[current]

document.getElementById("subjectName").innerText="Subject: "+q.subject

document.getElementById("qText").innerText="Question "+(current+1)+" : "+q.question

let optDiv=document.getElementById("options")
optDiv.innerHTML=""

q.options.forEach((opt,i)=>{
let checked=answers[current]==i?"checked":""

optDiv.innerHTML+=`
<label>
<input type="radio" name="opt" ${checked}
onclick="selectOption(${i})">
${opt}
</label><br>
`
})
}

/* ===== SELECT OPTION ===== */

function selectOption(i){
answers[current]=i
document.getElementById("p"+current).className="answered"
}

/* ===== NAVIGATION ===== */

function saveNext(){
next()
}

function next(){
if(current < questions.length-1){
current++
showQuestion()
}
}

function prev(){
if(current > 0){
current--
showQuestion()
}
}

/* ===== REVIEW ===== */

function markReview(){
review[current]=true
document.getElementById("p"+current).className="review"
}

/* ===== CLEAR ===== */

function clearAnswer(){
delete answers[current]
document.getElementById("p"+current).className="notvisited"
showQuestion()
}

/* ===== SUBMIT ===== */

function submitExam(){

let score=0

questions.forEach((q,i)=>{
if(answers[i]==q.correct){

if(q.subject==="Mathematics" || q.subject==="Biology"){
score+=2
}else{
score+=1
}

}
})

document.getElementById("result").innerText="Your Score: "+score

}

/* ===== INIT ===== */

createPalette()
showQuestion()

</script>

</body>
</html>
