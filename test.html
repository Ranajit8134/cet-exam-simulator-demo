<!DOCTYPE html>
<html>
<head>
<title>CET Exam</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
background:#14233b;
}

.tab{
padding:8px 15px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

.active{
background:#22c55e;
}

.container{
padding:20px;
}

.options label{
display:block;
margin:10px 0;
}

button{
padding:10px 15px;
margin:5px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>CET Examination</h2>
</header>

<!-- SUBJECT TABS -->
<div class="tabs">
<div class="tab active" onclick="switchSub('Physics',this)">Physics</div>
<div class="tab" onclick="switchSub('Chemistry',this)">Chemistry</div>
<div class="tab" onclick="switchSub('Math',this)">Math</div>
<div class="tab" onclick="switchSub('Biology',this)">Biology</div>
</div>

<div class="container">

<h3 id="qno"></h3>
<h3 id="qtext"></h3>

<div id="options" class="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAns()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

</div>

<script>

let allQ = JSON.parse(localStorage.getItem("liveTest")) || []

let subject="Physics"
let questions=[]
let current=0

let answers={}
let review={}

/* LOAD SUBJECT */
function load(){

questions = allQ.filter(q=>q.subject==subject)

current=0
show()

}

/* SWITCH SUBJECT */
function switchSub(sub,el){

subject=sub

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

load()

}

/* SHOW QUESTION */
function show(){

if(questions.length==0){
document.getElementById("qtext").innerText="No questions"
return
}

let q=questions[current]

document.getElementById("qno").innerText="Question "+(current+1)

document.getElementById("qtext").innerText=q.question

let opt=""

q.options.forEach((o,i)=>{

let checked = answers[current]==i ? "checked" : ""

opt+=`
<label>
<input type="radio" name="opt" ${checked}
onclick="select(${i})"> ${o}
</label>
`

})

document.getElementById("options").innerHTML=opt

}

/* SELECT */
function select(i){
answers[current]=i
}

/* NAV */
function next(){
if(current < questions.length-1){
current++
show()
}
}

function prev(){
if(current>0){
current--
show()
}
}

/* ACTIONS */
function saveNext(){
next()
}

function markReview(){
review[current]=true
alert("Marked for review")
}

function clearAns(){
delete answers[current]
show()
}

/* SUBMIT */
function submitExam(){

let score=0

allQ.forEach((q,i)=>{

let mark = (q.subject=="Math" || q.subject=="Biology") ? 2 : 1

if(answers[i]==q.correct){
score+=mark
}

})

let user=localStorage.getItem("user") || "Student"

let lb = JSON.parse(localStorage.getItem("leaderboard")) || []

lb.push({name:user,score:score})

lb.sort((a,b)=>b.score-a.score)

localStorage.setItem("leaderboard",JSON.stringify(lb))

alert("Your Score: "+score)

window.location.href="leaderboard.html"

}

/* START */
load()

</script>

</body>
</html>
