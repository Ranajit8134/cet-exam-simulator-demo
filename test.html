<!DOCTYPE html>
<html>
<head>

<title>CET Mock Test</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

button{
padding:10px 15px;
margin:10px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.question{
background:#1e2f4f;
padding:20px;
margin:20px 0;
border-radius:10px;
text-align:left;
}

</style>

</head>

<body>

<h1>CET Question Paper</h1>

<div class="container">

<input type="file" id="pdfFile">

<br>

<button onclick="loadPDF()">Convert to Mock Test</button>

<div id="questions"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>

let extractedText=""

async function loadPDF(){

let file=document.getElementById("pdfFile").files[0]

if(!file){
alert("Upload a PDF file")
return
}

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)

let pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)

let content=await page.getTextContent()

let strings=content.items.map(item=>item.str)

text+=strings.join(" ")

}

extractedText=text

generateQuestions()

}

reader.readAsArrayBuffer(file)

}

function generateQuestions(){

let container=document.getElementById("questions")

container.innerHTML=""

let blocks=extractedText.split(/\d+\./)

blocks.forEach((q,i)=>{

let options=q.match(/\([A-D]\).*?(?=\([A-D]\)|$)/g)

if(options){

let html=`<div class="question">
<b>Question ${i}</b><br>${q}<br><br>`

options.forEach(opt=>{
html+=`<label><input type="radio" name="q${i}"> ${opt}</label><br>`
})

html+="</div>"

container.innerHTML+=html

}

})

}

</script>

</body>
</html>
