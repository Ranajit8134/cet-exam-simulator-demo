<!DOCTYPE html>
<html>
<head>
<title>CET Exam</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.timer{
color:#22c55e;
font-weight:bold;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
background:#14233b;
}

.tab{
padding:8px 15px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

.active{
background:#22c55e;
}

.container{
display:flex;
}

.left{
flex:3;
padding:20px;
}

.right{
flex:1;
background:#14233b;
padding:10px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* COLORS */
.notvisited{background:grey}
.answered{background:#22c55e}
.review{background:#a855f7}

button{
padding:10px;
margin:5px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.options label{
display:block;
margin:10px 0;
}
</style>

</head>

<body>

<header>
<h2>CET Examination</h2>
<div class="timer" id="timer">180:00</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="container">

<div class="left">

<h3 id="subjectTitle"></h3>
<h3 id="qno"></h3>
<h3 id="qtext"></h3>

<div id="options" class="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAns()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

</div>

<div class="right">
<div class="palette" id="palette"></div>
</div>

</div>

<script>

let allQ = JSON.parse(localStorage.getItem("liveTest")) || []

// SUBJECT DETECTION
let subjects = [...new Set(allQ.map(q=>q.subject))]
subjects = subjects.map(s => s=="Math"?"Mathematics":s)

let currentSubject = subjects[0]
let questions = []
let current = 0

let answers={}
let review={}

/* TIMER (180 MIN) */
let totalTime = 180*60

setInterval(()=>{
totalTime--

let m = Math.floor(totalTime/60)
let s = totalTime%60

document.getElementById("timer").innerText =
m + ":" + (s<10?"0"+s:s)

if(totalTime<=0){
alert("Time up!")
submitExam()
}
},1000)

/* CREATE TABS */
let tabDiv=document.getElementById("tabs")

subjects.forEach((s,i)=>{
let d=document.createElement("div")
d.innerText=s
d.className="tab "+(i==0?"active":"")
d.onclick=()=>switchSub(s,d)
tabDiv.appendChild(d)
})

/* LOAD SUBJECT */
function load(){
questions = allQ.filter(q=>
(q.subject=="Math"?"Mathematics":q.subject)==currentSubject
)
current=0
createPalette()
show()
}

/* SWITCH SUBJECT (LOCK LOGIC) */
function switchSub(sub,el){

// LOCK PREVIOUS SUBJECT
let index = subjects.indexOf(currentSubject)
let nextIndex = subjects.indexOf(sub)

if(nextIndex < index){
alert("You cannot go back to previous section")
return
}

currentSubject=sub

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

load()
}

/* SHOW */
function show(){

if(questions.length==0){
document.getElementById("qtext").innerText="No questions"
return
}

let q=questions[current]

document.getElementById("subjectTitle").innerText="Subject: "+currentSubject
document.getElementById("qno").innerText="Question "+(current+1)
document.getElementById("qtext").innerText=q.question

let opt=""

q.options.forEach((o,i)=>{
let checked = answers[q.question]==i?"checked":""

opt+=`
<label>
<input type="radio" name="opt" ${checked}
onclick="select(${i})"> ${o}
</label>
`
})

document.getElementById("options").innerHTML=opt

}

/* SELECT */
function select(i){
answers[questions[current].question]=i
updatePalette()
}

/* NAVIGATION */
function next(){
if(current < questions.length-1){
current++
show()
}else{
goNextSubject()
}
}

function prev(){
if(current>0){
current--
show()
}
}

function saveNext(){
next()
}

/* AUTO SUBJECT SWITCH */
function goNextSubject(){

let i = subjects.indexOf(currentSubject)

if(i < subjects.length-1){

currentSubject = subjects[i+1]

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
if(t.innerText==currentSubject) t.classList.add("active")
})

load()

}else{
alert("All questions completed")
}

}

/* REVIEW */
function markReview(){
review[current]=true
updatePalette()
}

/* CLEAR */
function clearAns(){
delete answers[questions[current].question]
updatePalette()
show()
}

/* PALETTE */
function createPalette(){

let p=document.getElementById("palette")
p.innerHTML=""

questions.forEach((q,i)=>{

let b=document.createElement("button")
b.innerText=i+1
b.className="notvisited"

b.onclick=()=>{
current=i
show()
}

b.id="p"+i

p.appendChild(b)

})

}

/* UPDATE COLORS */
function updatePalette(){

questions.forEach((q,i)=>{

let btn=document.getElementById("p"+i)

if(review[i]){
btn.className="review"
}
else if(answers[q.question]!=undefined){
btn.className="answered"
}
else{
btn.className="notvisited"
}

})

}

/* SUBMIT */
function submitExam(){

let score=0

allQ.forEach(q=>{

let ans=answers[q.question]

let mark = (q.subject=="Math"||q.subject=="Mathematics"||q.subject=="Biology")?2:1

if(ans==q.correct){
score+=mark
}

})

let user = localStorage.getItem("user") || "Student"

let lb = JSON.parse(localStorage.getItem("leaderboard")) || []

lb.push({name:user,score:score})

lb.sort((a,b)=>b.score-a.score)

localStorage.setItem("leaderboard",JSON.stringify(lb))

alert("Your Score: "+score)

window.location.href="leaderboard.html"

}

/* INIT */
load()

</script>

</body>
</html>
