<!DOCTYPE html>
<html>
<head>
<title>CET Mock Test</title>

<style>

body{
background:#0b1a2f;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

.box{
background:#1e2f4f;
padding:25px;
border-radius:10px;
width:90%;
max-width:700px;
margin:auto;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.question{
margin-top:20px;
text-align:left;
background:#243b63;
padding:20px;
border-radius:8px;
}

.nextbtn{
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<h2>CET Question Paper</h2>

<div class="box">

<input type="file" id="pdfUpload" accept="application/pdf">

<br>

<button onclick="loadPDF()">Upload Question Paper</button>
<button onclick="startTest()">Convert to Mock Test</button>

<div id="questions"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

let extractedText="";
let questions=[];
let currentQuestion=0;

async function loadPDF(){

let file=document.getElementById("pdfUpload").files[0];

if(!file){
alert("Upload PDF first");
return;
}

let reader=new FileReader();

reader.onload=async function(){

let typedarray=new Uint8Array(this.result);

let pdf=await pdfjsLib.getDocument(typedarray).promise;

extractedText="";

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i);
let text=await page.getTextContent();

let pageText=text.items.map(item=>item.str).join(" ");

extractedText+=pageText+" ";

}

alert("PDF loaded successfully");

};

reader.readAsArrayBuffer(file);

}

function startTest(){

if(extractedText===""){
alert("Upload PDF first");
return;
}

/* split questions by numbers */
questions = extractedText.split(/\d+\s/).filter(q => q.trim().length>40);

currentQuestion=0;

showQuestion();

}

function showQuestion(){

let q=questions[currentQuestion];

document.getElementById("questions").innerHTML=`

<div class="question">

<b>Question ${currentQuestion+1}</b>

<br><br>

${q}

<br><br>

<label><input type="radio" name="q"> A</label><br>
<label><input type="radio" name="q"> B</label><br>
<label><input type="radio" name="q"> C</label><br>
<label><input type="radio" name="q"> D</label>

<div class="nextbtn">

<button onclick="nextQuestion()">Next</button>

</div>

</div>

`;

}

function nextQuestion(){

if(currentQuestion < questions.length-1){

currentQuestion++;

showQuestion();

}else{

alert("Test Finished");

}

}

</script>

</body>
</html>
