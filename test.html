<!DOCTYPE html>
<html>

<head>

<title>CET Mock Test</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

#timer{
font-size:20px;
font-weight:bold;
}

.container{
display:flex;
}

.question-area{
flex:3;
padding:30px;
}

.palette{
flex:1;
background:#14233b;
padding:20px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
}

.answered{
background:#22c55e;
color:white;
}

.notanswered{
background:#ccc;
}

.options label{
display:block;
margin:10px 0;
}

.nav-buttons{
margin-top:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>CET Mock Test</h2>

<div id="timer">180:00</div>

</header>

<div class="container">

<div class="question-area">

<h3 id="qText"></h3>

<div id="options" class="options"></div>

<div class="nav-buttons">

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitExam()">Submit Exam</button>

</div>

</div>

<div class="palette" id="palette"></div>

</div>

<script>

let questions=[]
let current=0
let answers={}

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data
createPalette()
showQuestion()
})

function createPalette(){

let p=document.getElementById("palette")

questions.forEach((q,i)=>{

let btn=document.createElement("button")

btn.innerText=i+1
btn.className="notanswered"

btn.onclick=()=>{

current=i
showQuestion()

}

btn.id="p"+i

p.appendChild(btn)

})

}

function showQuestion(){

let q=questions[current]

document.getElementById("qText").innerText=(current+1)+". "+q.question

let optDiv=document.getElementById("options")

optDiv.innerHTML=""

q.options.forEach((opt,i)=>{

let checked=answers[current]==i ? "checked":""

optDiv.innerHTML+=`
<label>
<input type="radio" name="opt" value="${i}" ${checked}
onclick="saveAnswer(${i})">
${opt}
</label>
`

})

}

function saveAnswer(i){

answers[current]=i

document.getElementById("p"+current).className="answered"

}

function nextQuestion(){

if(current<questions.length-1){

current++
showQuestion()

}

}

function prevQuestion(){

if(current>0){

current--
showQuestion()

}

}

function submitExam(){

let score=0

questions.forEach((q,i)=>{

if(answers[i]==q.correct){
score++
}

})

let accuracy=(score/questions.length*100).toFixed(2)

alert("Score: "+score+"/"+questions.length+"  Accuracy: "+accuracy+"%")

saveHistory(score,accuracy)

}

function saveHistory(score,accuracy){

let history=JSON.parse(localStorage.getItem("examHistory")) || []

history.push({
date:new Date().toLocaleDateString(),
score:score,
accuracy:accuracy
})

localStorage.setItem("examHistory",JSON.stringify(history))

}

let time=180*60

setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=m+":"+("0"+s).slice(-2)

if(time<=0){
submitExam()
}

},1000)

</script>

</body>

</html>
