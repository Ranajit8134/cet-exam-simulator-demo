<!DOCTYPE html>
<html>
<head>

<title>CET Mock Test</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1a2f;
color:white;
}

.header{
background:#13233f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
height:90vh;
}

.exam{
flex:3;
padding:20px;
}

.palette{
flex:1;
background:#1e2f4f;
padding:15px;
overflow:auto;
}

.qbox{
background:#243b63;
padding:20px;
border-radius:8px;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.palette button{
width:40px;
height:40px;
background:#334d7a;
margin:3px;
}

.answered{
background:#22c55e !important;
}

.review{
background:#f59e0b !important;
}

</style>

</head>

<body>

<div class="header">

<h2>CET Mock Test</h2>

<div id="timer">180:00</div>

</div>

<div style="padding:10px">

<input type="file" id="pdfUpload">

<button onclick="loadPDF()">Upload Question Paper</button>

</div>

<div class="container">

<div class="exam">

<div id="questionBox" class="qbox"></div>

<br>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="submitExam()">Submit Test</button>

<div id="result"></div>

</div>

<div class="palette" id="palette"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

let extractedText=""
let questions=[]
let answers={}
let review={}
let current=0

async function loadPDF(){

let file=document.getElementById("pdfUpload").files[0]

if(!file){
alert("Upload PDF first")
return
}

let reader=new FileReader()

reader.onload=async function(){

let typed=new Uint8Array(this.result)

let pdf=await pdfjsLib.getDocument(typed).promise

extractedText=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)

let txt=await page.getTextContent()

extractedText+=txt.items.map(i=>i.str).join(" ")

}

generateQuestions()

}

reader.readAsArrayBuffer(file)

}

function generateQuestions(){

let blocks = extractedText.split(/\d+\./)

blocks.forEach(q => {

let options = q.match(/\([A-D]\).*?(?=\([A-D]\)|$)/g)

if(options){

questions.push({
question:q,
options:options,
correct:0
})

}

})

buildPalette()

showQuestion()

}

function buildPalette(){

let palette=document.getElementById("palette")

palette.innerHTML=""

questions.forEach((q,i)=>{

let b=document.createElement("button")

b.innerText=i+1

b.onclick=function(){

current=i
showQuestion()

}

palette.appendChild(b)

})

}

function showQuestion(){

let q=questions[current]

let html="<h3>Question "+(current+1)+"</h3>"+q.question+"<br><br>"

q.options.forEach((o,i)=>{

let checked=(answers[current]==i)?"checked":""

html+=`
<label>
<input type="radio" name="ans" ${checked}
onclick="saveAnswer(${i})">
${o}
</label><br>
`

})

document.getElementById("questionBox").innerHTML=html

}

function saveAnswer(v){

answers[current]=v

localStorage.setItem("answers",JSON.stringify(answers))

palette.children[current].classList.add("answered")

}

function markReview(){

review[current]=true

palette.children[current].classList.add("review")

}

function nextQ(){

if(current<questions.length-1){
current++
showQuestion()
}

}

function prevQ(){

if(current>0){
current--
showQuestion()
}

}

let time=180*60

let timer=setInterval(function(){

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=
m+":"+(s<10?"0"+s:s)

time--

if(time<=0){
submitExam()
}

},1000)

function submitExam(){

clearInterval(timer)

let score=0

for(let i in answers){

if(answers[i]==questions[i].correct){
score++
}

}

let attempted=Object.keys(answers).length

let accuracy=(score/questions.length*100).toFixed(2)

/* save history */

let history = JSON.parse(localStorage.getItem("examHistory")) || []

history.push({
date:new Date().toLocaleDateString(),
score:score,
total:questions.length,
accuracy:accuracy
})

localStorage.setItem("examHistory",JSON.stringify(history))

document.getElementById("result").innerHTML=

"<h2>Result</h2>"+
"Total Questions: "+questions.length+"<br>"+
"Attempted: "+attempted+"<br>"+
"Score: "+score+"<br>"+
"Accuracy: "+accuracy+"%"

}

</script>

</body>
</html>


fetch("questions.json")
.then(res=>res.json())
.then(data=>{
questions=data
showQuestion()
})
