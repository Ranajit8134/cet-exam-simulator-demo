<!DOCTYPE html>
<html>

<head>

<title>CET Mock Test</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
}

.question-area{
flex:3;
padding:30px;
}

.palette{
flex:1;
background:#14233b;
padding:20px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.notvisited{background:grey}
.answered{background:#22c55e}
.review{background:#a855f7}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.options label{
display:block;
margin:10px 0;
}

.timer{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h2>CET Mock Test</h2>

<div class="timer">
Time Left: <span id="timer">180:00</span>
</div>

</header>

<div class="container">

<div class="question-area">

<h3 id="qText"></h3>

<div id="options" class="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAnswer()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

</div>

<div class="palette" id="palette"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>

let extractedText=""
let questions=[]
let current=0
let answers={}
let review={}

let answerKey = JSON.parse(localStorage.getItem("answerKey")) || []

/* TIMER */

let time=180*60

let timer=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText =
m+":"+(s<10?"0"+s:s)

time--

if(time<=0){
submitExam()
}

},1000)

/* LOAD PDF FROM ADMIN */

window.onload = async function(){

let storedPDF = localStorage.getItem("questionPDF")

if(!storedPDF){
alert("Admin has not uploaded question paper yet")
return
}

let pdfData = atob(storedPDF.split(",")[1])
let typedarray = new Uint8Array(pdfData.length)

for(let i=0;i<pdfData.length;i++){
typedarray[i]=pdfData.charCodeAt(i)
}

let pdf = await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)

let content=await page.getTextContent()

let strings=content.items.map(item=>item.str)

text+=strings.join(" ")

}

extractedText=text

extractQuestions()

}

/* EXTRACT QUESTIONS */

function extractQuestions(){

let blocks=extractedText.split(/\d+\./)

blocks.forEach(q=>{

let opts=q.match(/\([A-D]\).*?(?=\([A-D]\)|$)/g)

if(opts){

questions.push({
question:q,
options:opts
})

}

})

createPalette()

showQuestion()

}

/* PALETTE */

function createPalette(){

let p=document.getElementById("palette")

p.innerHTML=""

questions.forEach((q,i)=>{

let btn=document.createElement("button")

btn.innerText=i+1
btn.className="notvisited"

btn.onclick=()=>{

current=i
showQuestion()

}

btn.id="p"+i

p.appendChild(btn)

})

}

/* SHOW QUESTION */

function showQuestion(){

let q=questions[current]

document.getElementById("qText").innerText="Question "+(current+1)+" "+q.question

let optDiv=document.getElementById("options")

optDiv.innerHTML=""

q.options.forEach((opt,i)=>{

let checked=answers[current]==i?"checked":""

optDiv.innerHTML+=`
<label>
<input type="radio" name="opt" value="${i}" ${checked}
onclick="selectOption(${i})">
${opt}
</label>
`

})

}

/* SELECT OPTION */

function selectOption(i){

answers[current]=i

document.getElementById("p"+current).className="answered"

}

/* NAVIGATION */

function saveNext(){
next()
}

function next(){

if(current<questions.length-1){

current++

showQuestion()

}

}

function prev(){

if(current>0){

current--

showQuestion()

}

}

/* MARK REVIEW */

function markReview(){

review[current]=true

document.getElementById("p"+current).className="review"

}

/* CLEAR ANSWER */

function clearAnswer(){

delete answers[current]

document.getElementById("p"+current).className="notvisited"

showQuestion()

}

/* SUBMIT EXAM */

function submitExam(){

clearInterval(timer)

let score=0

questions.forEach((q,i)=>{

if(answers[i]==answerKey[i]){
score++
}

})

let accuracy=Math.round((score/questions.length)*100)

let username=localStorage.getItem("currentUser") || "Student"

let result={
user:username,
score:score,
total:questions.length,
accuracy:accuracy,
date:new Date().toLocaleDateString()
}

localStorage.setItem("lastResult",JSON.stringify(result))

let history=JSON.parse(localStorage.getItem("examHistory")) || []

history.push(result)

localStorage.setItem("examHistory",JSON.stringify(history))

window.location.href="results.html"

}

</script>

</body>

</html>
