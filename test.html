<!DOCTYPE html>
<html>
<head>

<title>CET Mock Test</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
}

.question-area{
flex:3;
padding:30px;
}

.palette{
flex:1;
background:#14233b;
padding:20px;
height:100vh;
overflow:auto;
}

.palette button{
width:40px;
height:40px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.notvisited{background:grey}
.answered{background:#22c55e}
.review{background:#a855f7}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.options label{
display:block;
margin:10px 0;
}

.timer{
color:#22c55e;
font-weight:bold;
}

.subject-bar{
padding:10px;
background:#14233b;
text-align:center;
}

.subject-btn{
margin:5px;
padding:8px 12px;
background:#1e293b;
border-radius:5px;
cursor:pointer;
}

.active-subject{
background:#22c55e;
}

</style>

</head>

<body>

<header>
<h2>CET Mock Test</h2>
<div class="timer" id="timer">Time Left: 180:00</div>
</header>

<!-- SUBJECT SWITCH -->
<div class="subject-bar">
<span class="subject-btn active-subject" onclick="changeSubject('Physics')">Physics</span>
<span class="subject-btn" onclick="changeSubject('Chemistry')">Chemistry</span>
<span class="subject-btn" onclick="changeSubject('Math')">Math</span>
</div>

<div class="container">

<div class="question-area">

<h3 id="subjectTitle"></h3>
<h3 id="qText"></h3>

<div id="options" class="options"></div>

<br>

<button onclick="saveNext()">Save & Next</button>
<button onclick="markReview()">Mark for Review</button>
<button onclick="clearAnswer()">Clear Response</button>

<br><br>

<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

</div>

<div class="palette" id="palette"></div>

</div>

<script>

let allQuestions = JSON.parse(localStorage.getItem("liveTest")) || []

if(allQuestions.length===0){
alert("No test uploaded")
}

/* AUTO ASSIGN SUBJECT (TEMP) */
allQuestions.forEach((q,i)=>{
if(i%3==0) q.subject="Physics"
else if(i%3==1) q.subject="Chemistry"
else q.subject="Math"
})

let currentSubject="Physics"
let questions=[]
let current=0
let answers={}
let review={}

/* FILTER SUBJECT */
function changeSubject(sub){

currentSubject=sub

document.querySelectorAll(".subject-btn").forEach(b=>{
b.classList.remove("active-subject")
})

event.target.classList.add("active-subject")

loadSubject()

}

/* LOAD SUBJECT QUESTIONS */
function loadSubject(){

questions = allQuestions.filter(q=>q.subject==currentSubject)

current=0

createPalette()
showQuestion()

}

/* TIMER */
let totalTime = 180*60

setInterval(()=>{
totalTime--
let m=Math.floor(totalTime/60)
let s=totalTime%60
document.getElementById("timer").innerText="Time Left: "+m+":"+s
if(totalTime<=0) submitExam()
},1000)

/* PALETTE */
function createPalette(){

let p=document.getElementById("palette")
p.innerHTML=""

questions.forEach((q,i)=>{

let btn=document.createElement("button")
btn.innerText=i+1
btn.className="notvisited"

btn.onclick=()=>{
current=i
showQuestion()
}

btn.id="p"+i

p.appendChild(btn)

})

}

/* SHOW */
function showQuestion(){

let q=questions[current]

document.getElementById("subjectTitle").innerText="Subject: "+currentSubject

document.getElementById("qText").innerText=
"Q"+(current+1)+" "+q.question

let optDiv=document.getElementById("options")
optDiv.innerHTML=""

q.options.forEach((opt,i)=>{

let checked=answers[current]==i?"checked":""

optDiv.innerHTML+=`
<label>
<input type="radio" name="opt" ${checked}
onclick="selectOption(${i})">
${opt}
</label>
`

})

}

/* SELECT */
function selectOption(i){
answers[current]=i
document.getElementById("p"+current).className="answered"
}

/* NAV */
function saveNext(){next()}

function next(){
if(current<questions.length-1){
current++
showQuestion()
}
}

function prev(){
if(current>0){
current--
showQuestion()
}
}

/* REVIEW */
function markReview(){
review[current]=true
document.getElementById("p"+current).className="review"
}

/* CLEAR */
function clearAnswer(){
delete answers[current]
document.getElementById("p"+current).className="notvisited"
showQuestion()
}

/* SUBMIT */
function submitExam(){

let score=0

questions.forEach((q,i)=>{
if(answers[i]==q.correct) score++
})

alert("Score: "+score+"/"+questions.length)

}

/* INIT */
loadSubject()

</script>

</body>
</html>
