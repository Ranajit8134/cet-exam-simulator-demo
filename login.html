<!DOCTYPE html>
<html>
<head>
<title>CET Login</title>
</head>

<body>

<h1>CET Exam Login</h1>

<input id="username" placeholder="Username">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
document.getElementById("msg").innerHTML="Enter username and password";
return;
}

let users=JSON.parse(localStorage.getItem("users")) || {};

users[username]=password;

localStorage.setItem("users",JSON.stringify(users));

document.getElementById("msg").innerHTML="Account created. Now login.";

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=JSON.parse(localStorage.getItem("users")) || {};

if(users[username] && users[username]===password){

document.getElementById("msg").innerHTML="Login successful";

setTimeout(function(){
window.location.href="test.html";
},1000);

}else{

document.getElementById("msg").innerHTML="Wrong username or password";

}

}

</script>

</body>
</html>
