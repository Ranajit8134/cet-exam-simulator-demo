<!DOCTYPE html>
<html>
<head>
<title>CET Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#000;
overflow:hidden;
}

/* ring container */

.ring{
position:relative;
width:450px;
height:450px;
display:flex;
justify-content:center;
align-items:center;
}

/* all rings */

.ring span{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:4px solid transparent;
animation:spin linear infinite;
}

/* different colors + speeds */

.ring span:nth-child(1){
border-top:4px solid #ff357a;
animation-duration:4s;
}

.ring span:nth-child(2){
border-right:4px solid #00e5ff;
animation-duration:6s;
}

.ring span:nth-child(3){
border-bottom:4px solid #fffd44;
animation-duration:5s;
}

.ring span:nth-child(4){
border-left:4px solid #00ff9d;
animation-duration:7s;
}

.ring span:nth-child(5){
border-top:4px solid #ff8c00;
animation-duration:9s;
}

.ring span:nth-child(6){
border-right:4px solid #8a2be2;
animation-duration:8s;
}

.ring span:nth-child(7){
border-bottom:4px solid #00ffff;
animation-duration:10s;
}

.ring span:nth-child(8){
border-left:4px solid #ff1493;
animation-duration:12s;
}

.ring span{
filter:drop-shadow(0 0 10px currentColor);
}

/* rotation */

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* login box */

.login{
position:absolute;
width:300px;
display:flex;
flex-direction:column;
gap:15px;
text-align:center;
}

.login h2{
color:#fff;
font-size:30px;
}

.inputBx input{
width:100%;
padding:12px;
border-radius:40px;
border:2px solid #fff;
background:transparent;
color:#fff;
outline:none;
text-align:center;
}

.inputBx input::placeholder{
color:#ccc;
}

.inputBx input[type="submit"]{
background:linear-gradient(45deg,#ff357a,#fffd44);
border:none;
color:#000;
font-weight:bold;
cursor:pointer;
}

.links{
display:flex;
justify-content:space-between;
}

.links a{
color:#fff;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="ring">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

<div class="login">

<h2>Login</h2>

<div class="inputBx">
<input type="text" id="username" placeholder="Username">
</div>

<div class="inputBx">
<input type="password" id="password" placeholder="Password">
</div>

<div class="inputBx">
<input type="submit" value="Sign in" onclick="login()">
</div>

<div class="links">
<a href="#">Forgot Password</a>
<a href="register.html">Signup</a>
</div>

</div>

</div>

<script>

function login(){

let username=document.getElementById("username").value
let password=document.getElementById("password").value

let users=JSON.parse(localStorage.getItem("users")) || {}

if(users[username] && users[username]===password){

alert("Login successful")

window.location.href="dashboard.html"

}else{

alert("Wrong username or password")

}

}

</script>

</body>
</html>
