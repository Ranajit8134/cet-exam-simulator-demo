<!DOCTYPE html>
<html>
<head>
<title>CET Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
margin:40px;
padding:20px;
border-radius:10px;
}

input{
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
font-size:16px;
}
</style>

</head>

<body>

<h1>CET Exam Login</h1>

<div class="card">

<input id="username" placeholder="Username"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function register(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

localStorage.setItem("user",u);
localStorage.setItem("pass",p);

document.getElementById("msg").innerHTML="Account created";

}

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==localStorage.getItem("user") && p==localStorage.getItem("pass")){

window.location.href="test.html";

}else{

document.getElementById("msg").innerHTML="Wrong username or password";

}

}

</script>

</body>
</html>
