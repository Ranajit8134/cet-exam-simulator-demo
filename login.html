<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
document.getElementById("msg").innerHTML="Enter username and password";
return;
}

let users=JSON.parse(localStorage.getItem("users")) || {};

users[username]=password;

localStorage.setItem("users",JSON.stringify(users));

document.getElementById("msg").innerHTML="Account created. Now login.";

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=JSON.parse(localStorage.getItem("users")) || {};

if(users[username] && users[username]===password){

document.getElementById("msg").innerHTML="Login successful";

setTimeout(function(){
window.location.href="test.html";
},1000);

}else{

document.getElementById("msg").innerHTML="Wrong username or password";

}

}

</script>
