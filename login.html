<!DOCTYPE html>
<html>
<head>

<title>CET Exam Portal Login</title>

<style>

body{
background:#0b1a2f;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e2f4f;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.register{
background:#334d7a;
}

</style>

</head>

<body>

<div class="box">

<h2>CET Exam Portal</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button class="register" onclick="openRegister()">Create Account</button>

<p id="msg"></p>

</div>

<script>

function login(){

let username=document.getElementById("username").value
let password=document.getElementById("password").value

let users=JSON.parse(localStorage.getItem("users")) || {}

if(users[username] && users[username]===password){

document.getElementById("msg").innerHTML="Login successful"

setTimeout(function(){

window.location.href="dashboard.html"

},1000)

}else{

document.getElementById("msg").innerHTML="Wrong username or password"

}

}

function openRegister(){

window.location.href="register.html"

}

</script>

</body>
</html>
