<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
document.getElementById("msg").innerHTML="Enter username and password";
return;
}

localStorage.setItem("cet_user",username);
localStorage.setItem("cet_pass",password);

document.getElementById("msg").innerHTML="Account created! Now login.";

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let savedUser=localStorage.getItem("cet_user");
let savedPass=localStorage.getItem("cet_pass");

if(username===savedUser && password===savedPass){

document.getElementById("msg").innerHTML="Login successful";

setTimeout(function(){
window.location.href="test.html";
},1000);

}else{

document.getElementById("msg").innerHTML="Wrong username or password";

}

}

</script>
