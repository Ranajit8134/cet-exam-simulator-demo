<!DOCTYPE html>
<html>
<head>
<title>Exam Result</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:30px;
display:flex;
justify-content:center;
}

.card{
background:white;
padding:30px;
width:400px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card h2{
margin-top:0;
color:#003366;
}

.result{
font-size:18px;
margin:10px 0;
}

.score{
font-size:28px;
color:#28a745;
font-weight:bold;
}

.btn{
margin-top:20px;
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
CET Examination Result
</div>

<div class="container">

<div class="card">

<h2>Your Result</h2>

<div class="result">Student: <span id="student"></span></div>

<div class="result">Score: <span id="score"></span></div>

<div class="result">Total Questions: <span id="total"></span></div>

<div class="result">Accuracy: <span id="accuracy"></span>%</div>

<div class="result">Exam Date: <span id="date"></span></div>

<button class="btn" onclick="back()">Back to Dashboard</button>

</div>

</div>

<script>

let result = JSON.parse(localStorage.getItem("lastResult"))

if(result){

document.getElementById("student").innerText = result.user
document.getElementById("score").innerText = result.score
document.getElementById("total").innerText = result.total
document.getElementById("accuracy").innerText = result.accuracy
document.getElementById("date").innerText = result.date

}

function back(){
window.location.href="dashboard.html"
}

</script>

</body>
</html>
