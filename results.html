<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
text-align:center;
padding:30px;
}

.card{
background:#14233b;
padding:25px;
border-radius:10px;
display:inline-block;
}

h1{color:#22c55e;}

.stat{
margin:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="card">

<h1>Exam Result</h1>

<div id="data"></div>

<br>

<button onclick="goLeaderboard()">View Leaderboard</button>

</div>

<script>

let result = JSON.parse(localStorage.getItem("examResult"))

let d=document.getElementById("data")

d.innerHTML=`
<div class="stat">👤 Name: ${result.username}</div>
<div class="stat">📊 Total Questions: ${result.total}</div>
<div class="stat">✅ Correct: ${result.correct}</div>
<div class="stat">❌ Wrong: ${result.wrong}</div>
<div class="stat">⚪ Not Attempted: ${result.notAttempted}</div>
<div class="stat"><h2>🏆 Score: ${result.score}</h2></div>
`

function goLeaderboard(){
window.location.href="leaderboard.html"
}

</script>

</body>
</html>
