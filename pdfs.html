<!DOCTYPE html>
<html>

<head>
<title>Upload Question Paper</title>

<style>

body{
background:#0b1a2f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Upload Question Paper</h2>

<input type="file" id="fileInput"><br>

<button onclick="handleFile()">Convert to Test</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>

<script>

async function handleFile(){

let file = document.getElementById("fileInput").files[0]

if(!file){
alert("Upload file first")
return
}

let text=""

/* PDF */
if(file.type==="application/pdf"){

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)

let pdf=await pdfjsLib.getDocument(typedarray).promise

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)
let content=await page.getTextContent()

let strings=content.items.map(item=>item.str)

text+=strings.join(" ")+" "

}

processText(text)

}

reader.readAsArrayBuffer(file)

}

/* IMAGE OCR */
else{

Tesseract.recognize(file,'eng')
.then(result=>{
text = result.data.text
processText(text)
})

}

}

/* SMART PARSER */

function processText(text){

let questions=[]

/* split questions */
let blocks = text.split(/Q\.?\s*\d+|\d+\./)

blocks.forEach(q=>{

/* detect options (very strong regex) */
let options = q.match(/(A[\).\s].*?|B[\).\s].*?|C[\).\s].*?|D[\).\s].*?)(?=A[\).\s]|B[\).\s]|C[\).\s]|D[\).\s]|$)/g)

if(options && options.length>=2){

questions.push({
question:q.trim(),
options:options.map(o=>o.trim())
})

}

})

if(questions.length===0){
alert("Could not detect questions properly. Try better PDF.")
return
}

/* SAVE */

localStorage.setItem("mockQuestions", JSON.stringify(questions))

alert("Converted "+questions.length+" questions!")

window.location.href="test.html"

}

</script>

</body>

</html>
