<!DOCTYPE html>
<html>

<head>

<title>CET Mock Test Generator</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:30px;
max-width:700px;
margin:auto;
}

.card{
background:#14233b;
padding:25px;
border-radius:8px;
margin-bottom:20px;
text-align:center;
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
margin:8px;
font-size:15px;
}

button:hover{
background:#16a34a;
}

input{
padding:10px;
}

.status{
margin-top:15px;
color:#22c55e;
}

</style>

</head>

<body>

<header>
CET Mock Test Generator
</header>

<div class="container">

<div class="card">

<h3>Upload Question Paper</h3>

<input type="file" id="pdfFile">

<br><br>

<button onclick="uploadPDF()">Upload PDF</button>

<p id="uploadStatus" class="status"></p>

</div>

<div class="card">

<h3>Convert PDF → Questions</h3>

<button onclick="convertPDF()">Generate Mock Test</button>

<p id="convertStatus" class="status"></p>

</div>

<div class="card">

<h3>Start Test</h3>

<button onclick="startTest()">Start Mock Test</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>

let extractedText=""

/* Upload PDF */

function uploadPDF(){

let file=document.getElementById("pdfFile").files[0]

if(!file){
alert("Select PDF first")
return
}

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)

let pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)

let content=await page.getTextContent()

let strings=content.items.map(item=>item.str)

text+=strings.join(" ")

}

extractedText=text

localStorage.setItem("uploadedPaper",text)

document.getElementById("uploadStatus").innerHTML="PDF Uploaded Successfully"

}

reader.readAsArrayBuffer(file)

}

/* Convert to questions */

function convertPDF(){

let text=localStorage.getItem("uploadedPaper")

if(!text){
alert("Upload PDF first")
return
}

let questions=[]

/* detect question blocks */

let blocks=text.split(/Question\s*\d+|\d+\)/i)

blocks.forEach(block=>{

let options=block.match(/\(?[A-D]\)?\s[^A-D]{1,120}/g)

if(options && options.length>=4){

let cleanOptions=options.slice(0,4)

questions.push({

question:block.substring(0,300),

options:cleanOptions

})

}

})

localStorage.setItem("mockQuestions",JSON.stringify(questions))

document.getElementById("convertStatus").innerHTML=

questions.length+" Questions Generated"

}

/* Start test */

function startTest(){

let q=localStorage.getItem("mockQuestions")

if(!q){
alert("Generate questions first")
return
}

window.location.href="test.html"

}

</script>

</body>

</html>
