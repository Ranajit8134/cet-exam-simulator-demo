<!DOCTYPE html><html><head>
<title>Admin Panel</title><style>

body{
background:#0b1a2f;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

.card{
background:#14233b;
padding:15px;
margin:15px 0;
border-radius:10px;
}

input, textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.save{background:#22c55e;color:white}
.delete{background:#ef4444;color:white}

.correct{
background:#22c55e;
color:white;
}

</style></head><body><h2>Admin Question Editor</h2><div id="questions"></div><button class="save" onclick="saveFinal()">Save Final Test</button>

<script>

let questions = JSON.parse(localStorage.getItem("mockQuestions")) || []

function load(){

let container=document.getElementById("questions")
container.innerHTML=""

questions.forEach((q,index)=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<b>Question ${index+1}</b>

<textarea onchange="updateQ(${index}, this.value)">${q.question}</textarea>${q.options.map((opt,i)=>`

<input value="${opt}" onchange="updateOpt(${index}, ${i}, this.value)"><button onclick="setCorrect(${index}, ${i})"
class="${q.correct==i?'correct':''}">
${['A','B','C','D'][i]}
</button>

`).join("")}

<br>
<button class="delete" onclick="deleteQ(${index})">Delete</button>`

container.appendChild(div)

})

}

function updateQ(i,val){
questions[i].question=val
}

function updateOpt(i,j,val){
questions[i].options[j]=val
}

function setCorrect(i,j){
questions[i].correct=j
load()
}

function deleteQ(i){
questions.splice(i,1)
load()
}

function saveFinal(){

localStorage.setItem("finalTest", JSON.stringify(questions))

alert("Final Test Saved!")

}

load()

</script></body></html>
