<!DOCTYPE html>
<html>
<head>
<title>Advanced Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

.qbox{
background:#14233b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.delete{
background:red;
}

textarea,input{
width:100%;
margin:5px 0;
padding:8px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<h2>🧠 Advanced Admin Panel (Editable)</h2>

<input type="file" id="pdfFile">
<button onclick="processPDF()">Upload & Convert</button>
<button onclick="addQuestion()">➕ Add Question</button>

<h3 id="status"></h3>
<div id="editor"></div>

<button onclick="saveTest()">💾 Save Final Test</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

let questions=[]

async function processPDF(){

let file=document.getElementById("pdfFile").files[0]

if(!file){
alert("Upload PDF")
return
}

document.getElementById("status").innerText="Processing..."

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)
let pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)
let viewport=page.getViewport({scale:2})

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport:viewport}).promise

let img=canvas.toDataURL()

let result=await Tesseract.recognize(img,"eng")

text += result.data.text + "\n"

}

parseText(text)

}

reader.readAsArrayBuffer(file)

}

/* SIMPLE PARSER */
function parseText(text){

questions=[]

let blocks = text.split(/\n?\d+\s*\./)

blocks.forEach(block=>{

block = block.replace(/\n+/g," ").trim()

if(block.length < 40) return

let opts = block.match(/\([A-D]\).*?(?=\([A-D]\)|$)/g)

if(!opts) return

let qText = block.split(/\([A-D]\)/)[0]

questions.push({
question:qText,
options:opts,
correct:0
})

})

renderEditor()

}

/* ADD QUESTION MANUALLY */
function addQuestion(){

questions.push({
question:"New Question",
options:["Option A","Option B","Option C","Option D"],
correct:0
})

renderEditor()

}

/* DELETE */
function deleteQ(i){
questions.splice(i,1)
renderEditor()
}

/* RENDER */
function renderEditor(){

let editor=document.getElementById("editor")
editor.innerHTML=""

questions.forEach((q,i)=>{

let optsHTML=""

q.options.forEach((opt,j)=>{

let checked = q.correct===j?"checked":""

optsHTML+=`
<input type="radio" name="c${i}" ${checked}
onclick="setCorrect(${i},${j})">
<input value="${opt}" onchange="updateOpt(${i},${j},this.value)">
<br>
`

})

let div=document.createElement("div")
div.className="qbox"

div.innerHTML=`
<b>Question ${i+1}</b>
<button class="delete" onclick="deleteQ(${i})">Delete</button>

<textarea onchange="updateQ(${i},this.value)">${q.question}</textarea>

${optsHTML}
`

editor.appendChild(div)

})

document.getElementById("status").innerText =
"Total Questions: "+questions.length

}

/* UPDATE */
function updateQ(i,v){questions[i].question=v}
function updateOpt(i,j,v){questions[i].options[j]=v}
function setCorrect(i,j){questions[i].correct=j}

/* SAVE */
function saveTest(){

localStorage.setItem("liveTest",JSON.stringify(questions))

alert("✅ Test Saved Successfully!")

}

</script>

</body>
</html>
