<!DOCTYPE html><html><head>
<title>Admin Panel</title><style>
body{
background:#0b1a2f;
color:white;
font-family:Arial;
padding:20px;
}

h2{text-align:center}
.center{text-align:center;margin-bottom:20px}

.card{
background:#14233b;
padding:15px;
margin:15px 0;
border-radius:10px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.save{background:#22c55e;color:white}
.delete{background:#ef4444;color:white}
.correct{background:#22c55e}
.upload{background:#3b82f6;color:white}

</style></head><body><h2>Admin Question Editor</h2><div class="center">
<input type="file" id="fileInput"><br>
<button class="upload" onclick="handleFile()">Upload & Convert</button>
<button class="save" onclick="saveFinal()">Save Final Test</button>
</div><div id="status" class="center"></div>
<div id="questions"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script><script>

let questions=[]

updateStatus()

function updateStatus(){
let s=document.getElementById("status")
s.innerHTML=questions.length==0
? "⚠ No questions loaded"
: "✅ "+questions.length+" questions loaded"
}

/* FILE HANDLER */

async function handleFile(){

let file=document.getElementById("fileInput").files[0]

if(!file){
alert("Upload file first")
return
}

if(file.type==="application/pdf"){
extractPDF(file)
}else{
extractImage(file)
}

}

/* PDF OCR */

async function extractPDF(file){

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)
let pdf=await pdfjsLib.getDocument(typedarray).promise

let fullText=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)

let viewport=page.getViewport({scale:2})

let canvas=document.createElement("canvas")
let context=canvas.getContext("2d")

canvas.height=viewport.height
canvas.width=viewport.width

await page.render({
canvasContext:context,
viewport:viewport
}).promise

/* OCR */
let result=await Tesseract.recognize(canvas,'eng')

fullText+=result.data.text+" "

}

processText(fullText)

}

reader.readAsArrayBuffer(file)

}

/* IMAGE OCR */

function extractImage(file){

Tesseract.recognize(file,'eng')
.then(result=>{
processText(result.data.text)
})

}

/* SMART PARSER */

function processText(text){

questions=[]

let blocks = text.split(/\d+\./)

blocks.forEach(q=>{

let opts = q.match(/([A-Da-d]|[A-Da-d][\).\s]).*?(?=[A-Da-d]|[A-Da-d][\).\s]|$)/g)

if(opts && opts.length>=2){

questions.push({
question:q.trim(),
options:opts.map(o=>o.trim()),
correct:null
})

}

})

if(questions.length===0){
alert("⚠ Could not detect questions. Try clearer PDF.")
return
}

updateStatus()
load()

}

/* LOAD UI */

function load(){

let container=document.getElementById("questions")
container.innerHTML=""

questions.forEach((q,index)=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<b>Question ${index+1}</b>

<textarea onchange="updateQ(${index}, this.value)">${q.question}</textarea>${q.options.map((opt,i)=>`

<input value="${opt}" onchange="updateOpt(${index}, ${i}, this.value)"><button onclick="setCorrect(${index}, ${i})"
class="${q.correct==i?'correct':''}">
${['A','B','C','D'][i]}
</button>

`).join("")}

<br>
<button class="delete" onclick="deleteQ(${index})">Delete</button>`

container.appendChild(div)

})

}

/* EDIT */

function updateQ(i,val){questions[i].question=val}
function updateOpt(i,j,val){questions[i].options[j]=val}

function setCorrect(i,j){
questions[i].correct=j
load()
}

function deleteQ(i){
questions.splice(i,1)
load()
updateStatus()
}

/* SAVE */

function saveFinal(){
localStorage.setItem("finalTest", JSON.stringify(questions))
alert("✅ Final Test Saved!")
}

</script></body></html>
