<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

.box{
background:#14233b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

input,textarea,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
margin:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin Panel (Create Exam)</h2>

<button onclick="addQ()">➕ Add Question</button>

<div id="editor"></div>

<button onclick="saveTest()">💾 Save Test</button>

<script>

let questions=[]

function addQ(){

questions.push({
question:"",
options:["","","",""],
correct:0,
subject:"Physics"
})

render()

}

function render(){

let e=document.getElementById("editor")
e.innerHTML=""

questions.forEach((q,i)=>{

let div=document.createElement("div")
div.className="box"

div.innerHTML=`
<b>Question ${i+1}</b>

<select onchange="setSubject(${i},this.value)">
<option>Physics</option>
<option>Chemistry</option>
<option>Math</option>
<option>Biology</option>
</select>

<textarea placeholder="Question" onchange="setQ(${i},this.value)">${q.question}</textarea>

<input placeholder="Option A" onchange="setOpt(${i},0,this.value)">
<input placeholder="Option B" onchange="setOpt(${i},1,this.value)">
<input placeholder="Option C" onchange="setOpt(${i},2,this.value)">
<input placeholder="Option D" onchange="setOpt(${i},3,this.value)">

<label>Correct Answer:</label>
<select onchange="setCorrect(${i},this.value)">
<option value="0">A</option>
<option value="1">B</option>
<option value="2">C</option>
<option value="3">D</option>
</select>
`

e.appendChild(div)

})

}

function setQ(i,v){questions[i].question=v}
function setOpt(i,j,v){questions[i].options[j]=v}
function setCorrect(i,v){questions[i].correct=parseInt(v)}
function setSubject(i,v){questions[i].subject=v}

function saveTest(){
localStorage.setItem("liveTest",JSON.stringify(questions))
alert("Test Saved")
}

</script>

</body>
</html>
