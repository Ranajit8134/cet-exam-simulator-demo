<!DOCTYPE html>
<html>
<head>
<title>Smart Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

.qbox{
background:#14233b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

button{
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
margin:5px;
}

textarea,input{
width:100%;
margin:5px 0;
padding:8px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<h2>🧠 Smart Cleaner Admin Panel</h2>

<input type="file" id="pdfFile">
<button onclick="processPDF()">Upload & Convert</button>

<h3 id="status"></h3>
<div id="editor"></div>

<button onclick="saveTest()">💾 Save Test</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

let questions=[]

async function processPDF(){

let file=document.getElementById("pdfFile").files[0]

if(!file){
alert("Upload PDF")
return
}

document.getElementById("status").innerText="Processing..."

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)
let pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)
let viewport=page.getViewport({scale:2})

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport:viewport}).promise

let img=canvas.toDataURL()

let result=await Tesseract.recognize(img,"eng")

text += result.data.text + "\n"

}

cleanAndParse(text)

}

reader.readAsArrayBuffer(file)

}

/* 🔥 CLEAN + SMART PARSER */
function cleanAndParse(text){

questions=[]

/* remove garbage */
text = text.replace(/[^a-zA-Z0-9().,+\-=/\n ]/g,"")

/* split by question numbers */
let blocks = text.split(/\n?\d+\s*\./)

blocks.forEach(block=>{

block = block.replace(/\n+/g," ").trim()

if(block.length < 30) return

/* detect options */
let opts = block.match(/\([A-D]\).*?(?=\([A-D]\)|$)/g)

if(!opts) return

/* remove options from question */
let qText = block.split(/\([A-D]\)/)[0]

/* clean */
qText = qText.trim()

questions.push({
question:qText,
options:opts,
correct:0
})

})

if(questions.length==0){
alert("❌ Still can't detect properly → Use clearer PDF")
return
}

renderEditor()

}

/* EDITOR */
function renderEditor(){

let editor=document.getElementById("editor")
editor.innerHTML=""

questions.forEach((q,i)=>{

let div=document.createElement("div")
div.className="qbox"

let optsHTML=""

q.options.forEach((opt,j)=>{

optsHTML+=`
<input type="radio" name="c${i}" ${j==0?"checked":""}
onclick="setCorrect(${i},${j})">
<input value="${opt}" onchange="updateOption(${i},${j},this.value)">
<br>
`

})

div.innerHTML=`
<b>Q${i+1}</b>
<textarea onchange="updateQ(${i},this.value)">${q.question}</textarea>
${optsHTML}
`

editor.appendChild(div)

})

document.getElementById("status").innerText=
"✅ "+questions.length+" Questions Loaded"

}

function updateQ(i,v){questions[i].question=v}
function updateOption(i,j,v){questions[i].options[j]=v}
function setCorrect(i,j){questions[i].correct=j}

/* SAVE */
function saveTest(){
localStorage.setItem("liveTest",JSON.stringify(questions))
alert("Saved Successfully!")
}

</script>

</body>
</html>
