<!DOCTYPE html>
<html>
<head>

<title>Admin Panel - Smart Upload</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
padding:20px;
}

h2{text-align:center;}

.container{
max-width:900px;
margin:auto;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

textarea,input{
width:100%;
margin:5px 0;
padding:8px;
border-radius:5px;
border:none;
}

.qbox{
background:#14233b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

.correct{
color:#22c55e;
font-weight:bold;
}
</style>

</head>

<body>

<h2>🧠 Smart Admin Panel (Auto Answer Detection)</h2>

<div class="container">

<input type="file" id="pdfFile">
<button onclick="processPDF()">Upload & Convert</button>

<h3 id="status"></h3>

<div id="editor"></div>

<button onclick="saveTest()">💾 Save Final Test</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

let questions=[]

async function processPDF(){

let file=document.getElementById("pdfFile").files[0]

if(!file){
alert("Upload PDF first")
return
}

document.getElementById("status").innerText="⏳ Processing..."

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(this.result)
let pdf=await pdfjsLib.getDocument(typedarray).promise

let text=""

/* OCR */
for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i)
let viewport=page.getViewport({scale:2})

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport:viewport}).promise

let img=canvas.toDataURL("image/png")

let result=await Tesseract.recognize(img,"eng")

text += result.data.text + "\n"

}

processText(text)

}

reader.readAsArrayBuffer(file)

}

/* SMART PARSER + ANSWER DETECTION */
function processText(text){

questions=[]

let blocks = text.split(/\n?\d+\s*\./)

blocks.forEach(block=>{

block = block.trim()

if(block.length < 20) return

let lines = block.split("\n").map(l=>l.trim()).filter(l=>l!="")

if(lines.length < 2) return

let questionText = lines[0]

let options=[]
let correctIndex=null

lines.slice(1).forEach(line=>{

/* detect options */
if(/\(?[A-D]\)?/.test(line)){
options.push(line)
}

/* detect answers */
if(/ans|answer/i.test(line)){

let match=line.match(/[A-D]/i)
if(match){
correctIndex = match[0].toUpperCase().charCodeAt(0)-65
}

}

})

if(options.length >= 2){

questions.push({
question:questionText,
options:options,
correct:correctIndex ?? 0
})

}

})

if(questions.length===0){
alert("❌ Could not detect questions properly")
return
}

renderEditor()

}

/* SHOW EDITOR */
function renderEditor(){

let editor=document.getElementById("editor")
editor.innerHTML=""

questions.forEach((q,index)=>{

let optsHTML=""

q.options.forEach((opt,i)=>{

let checked = q.correct===i ? "checked" : ""

optsHTML+=`
<input type="radio" name="c${index}" value="${i}" ${checked}
onclick="setCorrect(${index},${i})">
<input value="${opt}" onchange="updateOption(${index},${i},this.value)">
${q.correct===i ? "<span class='correct'>✔ Correct</span>" : ""}
<br>
`

})

let div=document.createElement("div")
div.className="qbox"

div.innerHTML=`
<b>Question ${index+1}</b><br>
<textarea onchange="updateQuestion(${index},this.value)">${q.question}</textarea>
<br>
${optsHTML}
`

editor.appendChild(div)

})

document.getElementById("status").innerText=
"✅ "+questions.length+" Questions Loaded"

}

/* UPDATE FUNCTIONS */
function updateQuestion(i,val){
questions[i].question = val
}

function updateOption(q,i,val){
questions[q].options[i]=val
}

function setCorrect(q,i){
questions[q].correct=i
renderEditor()
}

/* SAVE TEST */
function saveTest(){

localStorage.setItem("liveTest",JSON.stringify(questions))

alert("✅ Test Saved with Answers!")

}

</script>

</body>

</html>
