<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0b1a2f;
color:white;
margin:0;
}

header{
background:#081423;
padding:15px;
font-size:22px;
}

.container{
padding:30px;
}

.card{
background:#14233b;
padding:20px;
border-radius:10px;
width:500px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
}

button{
padding:10px 15px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
Admin Control Panel
</header>

<div class="container">

<div class="card">

<h3>Upload Question Paper</h3>

<input type="file" id="pdfUpload">

<button onclick="savePDF()">Save Question Paper</button>

<hr>

<h3>Upload Answer Key</h3>

<p>Example: A,B,C,D,A,B,C,D</p>

<textarea id="answerKey" rows="6"></textarea>

<button onclick="saveAnswers()">Save Answer Key</button>

</div>

</div>

<script>

/* save pdf */

function savePDF(){

let file=document.getElementById("pdfUpload").files[0]

if(!file){
alert("Upload PDF first")
return
}

let reader=new FileReader()

reader.onload=function(){

localStorage.setItem("questionPDF",reader.result)

alert("Question paper saved")

}

reader.readAsDataURL(file)

}

/* save answers */

function saveAnswers(){

let text=document.getElementById("answerKey").value

let arr=text.split(",")

let answers=[]

arr.forEach(a=>{

a=a.trim().toUpperCase()

if(a=="A")answers.push(0)
if(a=="B")answers.push(1)
if(a=="C")answers.push(2)
if(a=="D")answers.push(3)

})

localStorage.setItem("answerKey",JSON.stringify(answers))

alert("Answer key saved")

}

</script>

</body>

</html>
