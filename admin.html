<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

.box{
background:#14233b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

input,textarea,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
margin:5px;
cursor:pointer;
}

.delete{
background:#ef4444;
}
</style>
</head>

<body>

<h2>Admin Panel (Create Exam)</h2>

<button onclick="addQ()">➕ Add Question</button>

<div id="editor"></div>

<button onclick="saveTest()">💾 Save Test</button>

<script>

/* LOAD OLD DATA */
let questions = JSON.parse(localStorage.getItem("examQuestions")) || []

render()

function addQ(){
questions.push({
question:"",
options:["","","",""],
correct:0,
subject:"Physics"
})
render()
}

function deleteQ(i){
questions.splice(i,1)
render()
}

function render(){

let e=document.getElementById("editor")
e.innerHTML=""

questions.forEach((q,i)=>{

let div=document.createElement("div")
div.className="box"

div.innerHTML=`
<b>Question ${i+1}</b>

<select onchange="setSubject(${i},this.value)">
<option ${q.subject==="Physics"?"selected":""}>Physics</option>
<option ${q.subject==="Chemistry"?"selected":""}>Chemistry</option>
<option ${q.subject==="Mathematics"?"selected":""}>Mathematics</option>
<option ${q.subject==="Biology"?"selected":""}>Biology</option>
</select>

<textarea placeholder="Question" onchange="setQ(${i},this.value)">${q.question}</textarea>

<input placeholder="Option A" value="${q.options[0]}" onchange="setOpt(${i},0,this.value)">
<input placeholder="Option B" value="${q.options[1]}" onchange="setOpt(${i},1,this.value)">
<input placeholder="Option C" value="${q.options[2]}" onchange="setOpt(${i},2,this.value)">
<input placeholder="Option D" value="${q.options[3]}" onchange="setOpt(${i},3,this.value)">

<label>Correct Answer:</label>
<select onchange="setCorrect(${i},this.value)">
<option value="0" ${q.correct==0?"selected":""}>A</option>
<option value="1" ${q.correct==1?"selected":""}>B</option>
<option value="2" ${q.correct==2?"selected":""}>C</option>
<option value="3" ${q.correct==3?"selected":""}>D</option>
</select>

<button class="delete" onclick="deleteQ(${i})">❌ Delete</button>
`

e.appendChild(div)

})

}

/* SETTERS */
function setQ(i,v){questions[i].question=v}
function setOpt(i,j,v){questions[i].options[j]=v}
function setCorrect(i,v){questions[i].correct=parseInt(v)}

function setSubject(i,v){
questions[i].subject=v
}

/* VALIDATION + SAVE */
function saveTest(){

if(questions.length===0){
alert("❌ Add at least 1 question")
return
}

/* CHECK EMPTY */
for(let i=0;i<questions.length;i++){

let q=questions[i]

if(q.question.trim()===""){
alert("❌ Question "+(i+1)+" is empty")
return
}

for(let j=0;j<4;j++){
if(q.options[j].trim()===""){
alert("❌ Option missing in Question "+(i+1))
return
}
}

}

/* SAVE */
localStorage.setItem("examQuestions", JSON.stringify(questions))

alert("✅ Test Saved Successfully!")

}

</script>

</body>
</html>
