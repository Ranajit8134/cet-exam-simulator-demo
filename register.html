<!DOCTYPE html>
<html>
<head>
<title>CET Register</title>

<style>

body{
background:#0b1a2f;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e2f4f;
padding:30px;
border-radius:10px;
text-align:center;
color:white;
width:300px;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script>

function register(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
document.getElementById("msg").innerHTML="Enter username and password";
return;
}

let users=JSON.parse(localStorage.getItem("users")) || {};

users[username]=password;

localStorage.setItem("users",JSON.stringify(users));

document.getElementById("msg").innerHTML="Account created! Redirecting...";

setTimeout(function(){
window.location.href="login.html";
},1500);

}

</script>

</body>
</html>
