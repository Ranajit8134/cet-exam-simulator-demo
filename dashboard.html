<!DOCTYPE html>
<html>

<head>

<title>CET Examination Portal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* Header */

.header{
background:white;
padding:15px;
border-bottom:2px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
color:#003366;
}

/* Menu */

.menu{
background:#0b5ea8;
padding:10px;
}

.menu a{
color:white;
text-decoration:none;
margin-right:20px;
font-size:14px;
}

/* Layout */

.container{
display:flex;
padding:20px;
}

/* Sidebar */

.sidebar{
width:220px;
background:white;
padding:15px;
border-radius:5px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.sidebar h3{
margin-top:0;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:8px;
border-bottom:1px solid #eee;
}

/* Main */

.main{
flex:1;
margin-left:20px;
}

.card{
background:white;
padding:20px;
border-radius:5px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

/* Buttons */

.btn{
padding:10px 16px;
background:#28a745;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:10px;
}

.btn:hover{
background:#218838;
}

.btn2{
padding:10px 16px;
background:#ff9800;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:10px;
}

.btn2:hover{
background:#e68900;
}

.status{
color:green;
font-weight:bold;
}

/* Footer */

.footer{
background:#003366;
color:white;
text-align:center;
padding:10px;
font-size:12px;
position:fixed;
bottom:0;
width:100%;
}

</style>

</head>

<body>

<div class="header">
<h2>CET Examination Portal</h2>
<span id="student"></span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Change Password</a>
<a href="login.html">Logout</a>
</div>

<div class="container">

<div class="sidebar">

<h3>Activities</h3>

<ul>
<li>Registration Form ✔</li>
<li>Mock Test Portal</li>
<li>View Results</li>
<li>Leaderboard</li>
</ul>

</div>

<div class="main">

<div class="card">

<h3>Current Status</h3>

<p>Registration Status: <span class="status">Completed</span></p>

<p>Mock Test Availability: <span class="status">Available</span></p>

<br>

<button class="btn" onclick="startMock()">Start Mock Test</button>

<button class="btn2" onclick="startOnline()">Start Online Test</button>

<button class="btn" onclick="results()">View Results</button>

<button class="btn" onclick="leaderboard()">Leaderboard</button>

</div>

</div>

</div>

<div class="footer">
Online Examination Platform | CET Mock Test Portal
</div>

<script>

let user = localStorage.getItem("currentUser")

if(user){
document.getElementById("student").innerHTML="Student: "+user
}

/* Buttons */

function startMock(){
window.location.href="pdfs.html"
}

function startOnline(){
window.location.href="instructions.html"
}

function results(){
window.location.href="results.html"
}

function leaderboard(){
window.location.href="leaderboard.html"
}

</script>

</body>

</html>
