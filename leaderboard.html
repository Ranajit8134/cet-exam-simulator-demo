<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #555;
padding:10px;
}
</style>
</head>

<body>

<h2>Leaderboard</h2>

<table>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
<tbody id="data"></tbody>
</table>

<script>

let data=JSON.parse(localStorage.getItem("leaderboard")) || []

let tbody=document.getElementById("data")

data.forEach((d,i)=>{

tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${d.name}</td>
<td>${d.score}</td>
</tr>
`

})

</script>

</body>
</html>
