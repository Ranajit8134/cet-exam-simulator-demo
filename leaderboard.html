<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
font-family:Arial;
background:#0b1a2f;
color:white;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #1f3a5f;
text-align:center;
}

th{
background:#14233b;
}
</style>
</head>

<body>

<h2>Leaderboard</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Username</th>
<th>Score</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || []

let board=document.getElementById("board")

leaderboard.forEach((user,i)=>{
board.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${user.name}</td>
<td>${user.score}</td>
</tr>
`
})

</script>

</body>
</html>
